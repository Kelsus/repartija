<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="126" y1="92" x2="1482" y2="838" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A2217"/>
      <stop offset="1" stop-color="#123827"/>
    </linearGradient>
    <linearGradient id="panel" x1="140" y1="168" x2="1440" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153C2D" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0F2B1F" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="line" x1="280" y1="422" x2="1320" y2="422" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="84" y="88" width="1432" height="724" rx="34" fill="url(#panel)" stroke="#256748" stroke-width="2"/>

  <text x="144" y="158" fill="#EEF8F1" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">
    Flujo actual
  </text>
  <text x="144" y="202" fill="#A6CFBB" font-size="23" font-family="Inter, Arial, sans-serif">
    El valor esta claro, pero el cierre sigue empezando demasiado tarde.
  </text>

  <path d="M260 422H1338" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>

  <g>
    <rect x="144" y="288" width="250" height="258" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="200" cy="346" r="26" fill="#F59E0B"/>
    <text x="191" y="355" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">1</text>
    <text x="178" y="414" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Llega el ticket</text>
    <text x="178" y="468" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">La mesa recien ahi</text>
    <text x="178" y="498" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">empieza a ordenar</text>
    <text x="178" y="528" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">la cuenta.</text>

    <rect x="452" y="288" width="250" height="258" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="508" cy="346" r="26" fill="#F59E0B"/>
    <text x="499" y="355" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">2</text>
    <text x="486" y="414" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Se revisa</text>
    <text x="486" y="448" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">la cuenta</text>
    <text x="486" y="498" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Items, cantidades</text>
    <text x="486" y="528" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">y partes compartidas.</text>

    <rect x="760" y="288" width="250" height="258" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="816" cy="346" r="26" fill="#F59E0B"/>
    <text x="807" y="355" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">3</text>
    <text x="794" y="414" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Cada uno</text>
    <text x="794" y="448" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">marca lo suyo</text>
    <text x="794" y="498" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Aparece claridad</text>
    <text x="794" y="528" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">sobre cuanto paga.</text>

    <rect x="1068" y="288" width="328" height="258" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="1124" cy="346" r="26" fill="#F59E0B"/>
    <text x="1115" y="355" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">4</text>
    <text x="1102" y="414" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">El pago sucede</text>
    <text x="1102" y="448" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">por afuera</text>
    <text x="1102" y="498" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Repartija ordena</text>
    <text x="1102" y="528" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">la cuenta, pero no</text>
    <text x="1102" y="558" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">captura el cierre.</text>
  </g>

  <rect x="132" y="624" width="1300" height="122" rx="24" fill="#10271C" stroke="#2B7552"/>
  <text x="170" y="680" fill="#F6C65B" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Problema actual:
  </text>
  <text x="396" y="680" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif">
    la mejor parte del producto empieza cuando la experiencia del restaurant ya esta terminando.
  </text>
  <text x="170" y="720" fill="#A6CFBB" font-size="23" font-family="Inter, Arial, sans-serif">
    Hay claridad para dividir, pero todavia hay friccion para pagar y cerrar la mesa.
  </text>
</svg>
