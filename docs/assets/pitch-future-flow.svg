<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="110" y1="88" x2="1496" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091D15"/>
      <stop offset="1" stop-color="#112F23"/>
    </linearGradient>
    <linearGradient id="panel2" x1="124" y1="174" x2="1450" y2="764" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153C2D" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#10291E" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="line2" x1="266" y1="414" x2="1326" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)"/>
  <rect x="84" y="88" width="1432" height="724" rx="34" fill="url(#panel2)" stroke="#2B7552" stroke-width="2"/>

  <text x="144" y="158" fill="#EEF8F1" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">
    Flujo siguiente etapa
  </text>
  <text x="144" y="202" fill="#A6CFBB" font-size="23" font-family="Inter, Arial, sans-serif">
    La mesa se puede dividir y pagar sin pedir asistencia al staff.
  </text>

  <path d="M248 414H1342" stroke="url(#line2)" stroke-width="10" stroke-linecap="round"/>

  <g>
    <rect x="144" y="286" width="250" height="250" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="200" cy="344" r="26" fill="#22C55E"/>
    <text x="191" y="353" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">1</text>
    <text x="178" y="412" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Se escanea</text>
    <text x="178" y="446" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">la mesa</text>
    <text x="178" y="496" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Cada persona entra</text>
    <text x="178" y="526" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">desde su celular.</text>

    <rect x="452" y="286" width="250" height="250" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="508" cy="344" r="26" fill="#2DD4BF"/>
    <text x="499" y="353" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">2</text>
    <text x="486" y="412" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Se elige</text>
    <text x="486" y="446" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">el consumo</text>
    <text x="486" y="496" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Individual o</text>
    <text x="486" y="526" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">compartido.</text>

    <rect x="760" y="286" width="250" height="250" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="816" cy="344" r="26" fill="#8CCB5A"/>
    <text x="807" y="353" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">3</text>
    <text x="794" y="412" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Se paga</text>
    <text x="794" y="446" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">en el celular</text>
    <text x="794" y="496" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Sin esperar ticket</text>
    <text x="794" y="526" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">ni mozo.</text>

    <rect x="1068" y="286" width="328" height="250" rx="26" fill="#173D2E" stroke="#2D7B56"/>
    <circle cx="1124" cy="344" r="26" fill="#F59E0B"/>
    <text x="1115" y="353" fill="#17301F" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">4</text>
    <text x="1102" y="412" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Mesa saldada</text>
    <text x="1102" y="446" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">y local avisado</text>
    <text x="1102" y="496" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">Cuando todos pagan,</text>
    <text x="1102" y="526" fill="#A6CFBB" font-size="21" font-family="Inter, Arial, sans-serif">el cierre queda resuelto.</text>
  </g>

  <g>
    <rect x="132" y="610" width="406" height="122" rx="24" fill="#10271C" stroke="#2B7552"/>
    <text x="168" y="668" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
      Menos friccion
    </text>
    <text x="168" y="708" fill="#A6CFBB" font-size="22" font-family="Inter, Arial, sans-serif">
      dividir y pagar se resuelve en el mismo flujo.
    </text>

    <rect x="598" y="610" width="406" height="122" rx="24" fill="#10271C" stroke="#2B7552"/>
    <text x="634" y="668" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
      Mejor experiencia
    </text>
    <text x="634" y="708" fill="#A6CFBB" font-size="22" font-family="Inter, Arial, sans-serif">
      nadie necesita llamar al mozo para cerrar la mesa.
    </text>

    <rect x="1064" y="610" width="368" height="122" rx="24" fill="#10271C" stroke="#2B7552"/>
    <text x="1100" y="668" fill="#EEF8F1" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
      Revenue
    </text>
    <text x="1100" y="708" fill="#A6CFBB" font-size="22" font-family="Inter, Arial, sans-serif">
      la monetizacion aparece en el pago.
    </text>
  </g>
</svg>
